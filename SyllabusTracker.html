<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 12 Maths Tracker 2025-26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .custom-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .custom-checkbox:checked {
            background-color: #10b981;
            border-color: #10b981;
        }

        .custom-checkbox:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
        }

        .chapter-card {
            transition: all 0.2s ease;
        }

        .chapter-card.completed {
            background-color: #ecfdf5;
            border-color: #a7f3d0;
        }

        .chapter-card.completed .chapter-title {
            text-decoration: line-through;
            color: #065f46;
        }

        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Maths Syllabus 2025-26</h1>
                <p class="text-slate-500 mt-1">Track your board exam preparation progress</p>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="relative w-16 h-16">
                    <svg class="w-full h-full">
                        <circle class="text-slate-100" stroke-width="6" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                        <circle id="progress-circle" class="text-emerald-500 progress-ring" stroke-width="6" stroke-dasharray="175.93" stroke-dashoffset="175.93" stroke-linecap="round" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-xs font-bold" id="progress-text">0%</div>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Total Marks</p>
                    <p class="text-2xl font-black text-slate-800" id="marks-display">0/80</p>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-sm text-slate-500 font-medium">Chapters Finished</p>
                <p class="text-2xl font-bold text-slate-900" id="chapters-done">0 / 13</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-sm text-slate-500 font-medium">Internal Assessment</p>
                <p class="text-2xl font-bold text-slate-900">+20 Marks</p>
            </div>
            <div class="bg-indigo-600 p-5 rounded-2xl shadow-lg shadow-indigo-100 text-white">
                <p class="text-indigo-100 text-sm font-medium">Projected Total</p>
                <p class="text-2xl font-bold" id="projected-total">20 / 100</p>
            </div>
        </div>

        <!-- Accordion/Unit Container -->
        <div id="syllabus-container" class="space-y-4">
            <!-- Units will be injected here -->
        </div>

        <div class="mt-12 mb-8 flex flex-col items-center justify-center gap-4">
            <p class="text-slate-400 text-xs">© 2025-26 Academic Year Tracker • CBSE Mathematics (041)</p>
            <button onclick="resetProgress()" class="text-xs text-slate-400 hover:text-red-500 underline transition-colors">Clear All Data</button>
        </div>
    </div>

    <script>
        const SYLLABUS = [
            {
                unit: "Unit I: Relations and Functions",
                marks: 8,
                chapters: [
                    { id: "ch1", name: "Relations and Functions", weight: 4 },
                    { id: "ch2", name: "Inverse Trigonometric Functions", weight: 4 }
                ]
            },
            {
                unit: "Unit II: Algebra",
                marks: 10,
                chapters: [
                    { id: "ch3", name: "Matrices", weight: 5 },
                    { id: "ch4", name: "Determinants", weight: 5 }
                ]
            },
            {
                unit: "Unit III: Calculus",
                marks: 35,
                chapters: [
                    { id: "ch5", name: "Continuity and Differentiability", weight: 9 },
                    { id: "ch6", name: "Applications of Derivatives", weight: 4 },
                    { id: "ch7", name: "Integrals", weight: 9 },
                    { id: "ch8", name: "Applications of Integrals", weight: 6 },
                    { id: "ch9", name: "Differential Equations", weight: 7 }
                ]
            },
            {
                unit: "Unit IV: Vectors & 3D Geometry",
                marks: 14,
                chapters: [
                    { id: "ch10", name: "Vectors", weight: 7 },
                    { id: "ch11", name: "Three-Dimensional Geometry", weight: 7 }
                ]
            },
            {
                unit: "Unit V: Linear Programming",
                marks: 5,
                chapters: [
                    { id: "ch12", name: "Linear Programming", weight: 5 }
                ]
            },
            {
                unit: "Unit VI: Probability",
                marks: 8,
                chapters: [
                    { id: "ch13", name: "Probability", weight: 8 }
                ]
            }
        ];

        let completed = JSON.parse(localStorage.getItem('maths-2025-progress')) || [];

        function render() {
            const container = document.getElementById('syllabus-container');
            container.innerHTML = '';

            SYLLABUS.forEach((unit, idx) => {
                const unitEl = document.createElement('div');
                unitEl.className = 'bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm';
                
                const unitDone = unit.chapters.every(ch => completed.includes(ch.id));

                unitEl.innerHTML = `
                    <div class="p-5 flex items-center justify-between bg-slate-50/50 border-b border-slate-100">
                        <div>
                            <h3 class="font-bold text-slate-800">${unit.unit}</h3>
                            <p class="text-xs text-slate-500">${unit.marks} Marks Weightage</p>
                        </div>
                        ${unitDone ? '<span class="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full uppercase tracking-tighter">Unit Complete</span>' : ''}
                    </div>
                    <div class="p-4 space-y-3">
                        ${unit.chapters.map(ch => `
                            <div class="chapter-card p-4 rounded-xl border border-slate-100 flex items-center justify-between ${completed.includes(ch.id) ? 'completed border-emerald-200' : 'bg-white hover:border-indigo-200'}">
                                <div class="flex items-center gap-4">
                                    <input type="checkbox" 
                                           class="custom-checkbox" 
                                           ${completed.includes(ch.id) ? 'checked' : ''} 
                                           onchange="toggleChapter('${ch.id}')">
                                    <span class="chapter-title font-semibold text-slate-700">${ch.name}</span>
                                </div>
                                <span class="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded">${ch.weight}M</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(unitEl);
            });

            updateStats();
        }

        function toggleChapter(id) {
            if (completed.includes(id)) {
                completed = completed.filter(i => i !== id);
            } else {
                completed.push(id);
            }
            localStorage.setItem('maths-2025-progress', JSON.stringify(completed));
            render();
        }

        function updateStats() {
            let totalEarned = 0;
            SYLLABUS.forEach(unit => {
                unit.chapters.forEach(ch => {
                    if (completed.includes(ch.id)) totalEarned += ch.weight;
                });
            });

            const percent = Math.round((totalEarned / 80) * 100);
            
            // Update Text
            document.getElementById('marks-display').innerText = `${totalEarned}/80`;
            document.getElementById('chapters-done').innerText = `${completed.length} / 13`;
            document.getElementById('projected-total').innerText = `${totalEarned + 20} / 100`;
            document.getElementById('progress-text').innerText = `${percent}%`;

            // Update Progress Ring
            const circle = document.getElementById('progress-circle');
            const radius = 28;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function resetProgress() {
            if (confirm("Are you sure you want to reset your progress? This cannot be undone.")) {
                completed = [];
                localStorage.removeItem('maths-2025-progress');
                render();
            }
        }

        // Initialize
        render();
    </script>
</body>
</html>
